<modal id="pausemodal">
  <span style="width: 100%; text-align: center; bottom: 0; margin-bottom: 1lh;">esc or enter to unpause</span>
  <button id="quitButton"> quit </button>
  <button id="restartButton">restart</button>
</modal>
<modal id="deathmsg">
  <h1>Game Over!</h1>
  <button id="retryButton">Try Again</button>
  <button>Maybe Later</button>
</modal>
<songprogress></songprogress>
<column>
  <sidecolumn></sidecolumn>
  <notecontainer>
    <hitline>
      <hitlinelight>
    </hitline>
  </notecontainer>
  <sidecolumn style="padding-top: var(--barwidth)">
    <span id="timestamp"></span>
    <div id="infobox">
      <div id="scorebox">
        <div>
          <lettergrade>A</lettergrade>
          <plusminus>-</plusminus>
        </div>
        <span id="accuracyDiv"></span>
      </div>
      <scorebar></scorebar>
    </div>
  </sidecolumn>
</column>
<overlay>
  <hpbar></hpbar>
</overlay>

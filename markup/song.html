<modal id="pausemodal">
  <span style="width: 100%; text-align: center; bottom: 0; margin-bottom: 3lh;">esc or enter to unpause</span>
  <div style="display: flex; flex-direction: row; justify-content: center; gap: 50px; align-items: center">
    <button id="quitButton" style="mask-image: url('./style/icons/quit.svg');"></button>
    <button id="restartButton" style="mask-image:url('./style/icons/restart.svg')"></button>
  </div>
</modal>
<modal id="deathmsg">
  <h1>Game Over!</h1>
  <button id="retryButton">Try Again</button>
  <button id="exitButton">Maybe Later</button>
</modal>
<canvas id="wave-canvas"></canvas>
<songprogress></songprogress>
<column>
  <sidecolumn></sidecolumn>
  <notecontainer>
    <hitline>
      <hitlinelight>
    </hitline>
  </notecontainer>
  <sidecolumn style="padding-top: var(--barwidth)">
    <span id="timestamp"></span>
    <div id="infobox">
      <div id="scorebox">
        <div>
          <lettergrade>A</lettergrade>
          <plusminus>-</plusminus>
        </div>
        <span id="accuracyDiv"></span>
      </div>
      <scorebar></scorebar>
    </div>
  </sidecolumn>
</column>
<gutter>
  <hpbar id="hpbar">
    <div id="heart"><span></span></div>
    <!-- TODO remove animation from hearttext-->
    <!-- TODO change svg path for bottom to be bottom of div -->
  </hpbar>
</gutter>
